{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <div>
        <h1>Alterar senha</h1>
        <p>Atualize sua senha de acesso ao sistema.</p>
    </div>
</div>

<section class="card narrow">
    <form method="post" class="compact-form">
        <label>Senha atual
            <input type="password" name="current_password" required autocomplete="current-password">
        </label>
        <label>Nova senha
            <input type="password" name="new_password" required minlength="8" autocomplete="new-password">
        </label>
        <label>Confirmar nova senha
            <input type="password" name="confirm_password" required minlength="8" autocomplete="new-password">
        </label>
        <p class="muted">Use pelo menos 8 caracteres e evite senhas comuns como admin123 ou 123456.</p>
        <div class="actions-row">
            <button class="btn primary" type="submit">Alterar senha</button>
            <a class="btn" href="{{ url_for('dashboard') }}">Cancelar</a>
        </div>
    </form>
</section>
{% endblock %}
